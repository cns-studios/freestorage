services:
  userdata-server:
    build:
      context: ./userdata-server
    container_name: freestorage-userdata-server
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - PORT=8086
      - SECRET_KEY=${SECRET_KEY:-YOUR_SUPER_SECRET_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-YOUR_INTERNAL_SERVICE_KEY}
      - USERDATA_DB_HOST=${USERDATA_DB_HOST}
      - USERDATA_DB_PORT=${USERDATA_DB_PORT:-5432}
      - USERDATA_DB_NAME=${USERDATA_DB_NAME:-freestorage_userdata}
      - USERDATA_DB_USER=${USERDATA_DB_USER}
      - USERDATA_DB_PASSWORD=${USERDATA_DB_PASSWORD}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8086/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  content-server:
    build:
      context: ./content-server
    container_name: freestorage-content-server
    restart: unless-stopped
    ports:
      - "8085:8085"
      - "3002:3002"
    environment:
      - HTTP_PORT=8085
      - WS_PORT=3002
      - USERDATA_SERVER_URL=http://userdata-server:8086
      - SECRET_KEY=${SECRET_KEY:-YOUR_SUPER_SECRET_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-YOUR_INTERNAL_SERVICE_KEY}
      - CONTENT_DB_HOST=${CONTENT_DB_HOST}
      - CONTENT_DB_PORT=${CONTENT_DB_PORT:-5432}
      - CONTENT_DB_NAME=${CONTENT_DB_NAME:-freestorage_content}
      - CONTENT_DB_USER=${CONTENT_DB_USER}
      - CONTENT_DB_PASSWORD=${CONTENT_DB_PASSWORD}
      - DRAGONFLY_HOST=${DRAGONFLY_HOST}
      - DRAGONFLY_PORT=${DRAGONFLY_PORT:-6379}
      - DRAGONFLY_PASSWORD=${DRAGONFLY_PASSWORD}
    depends_on:
      userdata-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8085/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  admin:
    build:
      context: ./userdata-server
    container_name: freestorage-admin
    restart: unless-stopped
    command: node admin/server.js
    environment:
      - PORT=3004
      - ADMIN_TOKEN=${ADMIN_TOKEN:-YOUR_ADMIN_PASSWORD}
      - USERDATA_DB_HOST=${USERDATA_DB_HOST}
      - USERDATA_DB_PORT=${USERDATA_DB_PORT:-5432}
      - USERDATA_DB_NAME=${USERDATA_DB_NAME:-freestorage_userdata}
      - USERDATA_DB_USER=${USERDATA_DB_USER}
      - USERDATA_DB_PASSWORD=${USERDATA_DB_PASSWORD}
    depends_on:
      userdata-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/auth-status', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  host:
    build:
      context: ./host
    container_name: freestorage-host-server
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      - PORT=8087
      - USERDATA_SERVER_URL=http://userdata-server:8086
    depends_on:
      userdata-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8087/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  bot1:
    build:
      context: ./bot
    container_name: bot1
    restart: unless-stopped
    volumes:
      - ./bot/instances/bot1:/bot-data
    environment:
      - WS_URL=ws://content-server:3002
      - DATA_DIR=/bot-data
    depends_on:
      content-server:
        condition: service_healthy

  bot2:
    build:
      context: ./bot
    container_name: bot2
    restart: unless-stopped
    volumes:
      - ./bot/instances/bot2:/bot-data
    environment:
      - WS_URL=ws://content-server:3002
      - DATA_DIR=/bot-data
    depends_on:
      content-server:
        condition: service_healthy

  bot3:
    build:
      context: ./bot
    container_name: bot3
    restart: unless-stopped
    volumes:
      - ./bot/instances/bot3:/bot-data
    environment:
      - WS_URL=ws://content-server:3002
      - DATA_DIR=/bot-data
    depends_on:
      content-server:
        condition: service_healthy

  bot4:
    build:
      context: ./bot
    container_name: bot4
    restart: unless-stopped
    volumes:
      - ./bot/instances/bot4:/bot-data
    environment:
      - WS_URL=ws://content-server:3002
      - DATA_DIR=/bot-data
    depends_on:
      content-server:
        condition: service_healthy

  bot5:
    build:
      context: ./bot
    container_name: bot5
    restart: unless-stopped
    volumes:
      - ./bot/instances/bot5:/bot-data
    environment:
      - WS_URL=ws://content-server:3002
      - DATA_DIR=/bot-data
    depends_on:
      content-server:
        condition: service_healthy
